<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">

    <title>Loto machine</title>
</head>

<body>

    <section id="slot_machine">
        <section id="main-screen">
            <section id="payout">
                <h2>Payout</h2>
                <div id="wins1" class="wins">
                    <img class="winner1" src="../images/gambling_images/7-cartoon.png">
                    <img class="winner1" src="../images/gambling_images/7-cartoon.png">
                    <img class="winner1" src="../images/gambling_images/7-cartoon.png">
                </div>
                <div id="wins2" class="wins">
                    <img class="winner1" src="../images//gambling_images/Bar.png">
                    <img class="winner1" src="../images//gambling_images/Bar.png">
                    <img class="winner1" src="../images//gambling_images/Bar.png">
                </div>
                <div id="wins3" class="wins">
                    <img class="winner2" src="../images/gambling_images/bell.png">
                    <img class="winner2" src="../images/gambling_images/bell.png">
                    <img class="winner2" src="../images/gambling_images/bell.png">
                    <h5>OR</h5>
                    <img class="winner2" src="../images/gambling_images/cherry.png">
                    <img class="winner2" src="../images/gambling_images/cherry.png">
                    <img class="winner2" src="../images/gambling_images/cherry.png">
                </div>
                <div id="wins4" class="wins2">
                    <img class="winner3" src="../images/gambling_images/lemon.png">
                    <img class="winner3" src="../images/gambling_images/lemon.png">
                    <img class="winner3" src="../images/gambling_images/lemon.png">
                    <h5>OR</h5>
                    <img class="winner3" src="../images/gambling_images/orange.png">
                    <img class="winner3" src="../images/gambling_images/orange.png">
                    <img class="winner3" src="../images/gambling_images/orange.png">
                    <h5>OR</h5>
                    <img class="winner3" src="../images/gambling_images/Grape.png">
                    <img class="winner3" src="../images/gambling_images/Grape.png">
                    <img class="winner3" src="../images/gambling_images/Grape.png">
                </div>
                <div id="wins5" class="wins">
                    <h5>TWO OF ANY WINS HALF MONEY BACK</h5>
                </div>
            </section>
            <section id="spinners">

                <div class="spinner_image">
                    <img class="images" src="../images/gambling_images/bell.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="../images/gambling_images/7-cartoon.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="../images/gambling_images/cherry.png">
                </div>
                <div id="won" class="spinner_image">
                    <img class="images" src="../images/gambling_images/Bar.png">
                </div>
                <div id="won1" class="spinner_image">
                    <img class="images" src="../images/gambling_images/Bar.png">
                </div>
                <div id="won2" class="spinner_image">
                    <img class="images" src="../images/gambling_images/Bar.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="../images/gambling_images/Grape.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="../images/gambling_images/lemon.png">
                </div>
                <div class="spinner_image">
                    <img class="images" src="../images/gambling_images/orange.png">
                </div>
            </section>
        </section>
        <section id="controls">
            <div id="all_controls">
                <div id="control_title">
                    <h1>Bet To Win</h1>
                    <div id="credits">
                        <h2>$2090</h2>
                    </div>
                </div>
                <div id="control_buttons">
                    <button id="bet_one">+1</button>
                    <button id="bet_five">+5</button>
                    <button id="bet_ten">+10</button>
                    <button id="-10">-10</button>
                    <button id="-5">-5</button>
                    <button id="-1">-1</button>
                    <button id="bet_all">Bet All</button>
                    <button id="remove_all">Remove Bet</button>
                </div>
            </div>
            <div id="play">
                <img id="spin_border" src="./resources/images/spin_border.png">
                <a href="">
                    <div id="play_button">
                        <h1>Spin</h1>
                    </div>
                </a>

            </div>
        </section>
    </section>
</body>

</html>
