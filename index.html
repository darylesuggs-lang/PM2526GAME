<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./resources/css/styles.css">
    <link rel="stylesheet" href="resources/css/main-menu.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div id="main_menu">
        <div class="game-title-and-buttons">
            <div class="game-title-container">
                <img src="./resources/images/chris-logo.png" alt="Game Title" class="game-title">
            </div>

            <div class="button-container">
                <button id="start_button" class="pink-button">START NEW GAME</button>
                <button id="settings_button" class="pink-button">SETTINGS</button>
                <button id="quit_button" class="pink-button">QUIT</button>
            </div>
        </div>
        
        <div class="linear_effect"> </div>
        <div id="line_effect"> </div>
        <div class="circle" id="c1"></div>
        <div class="circle" id="c2"></div>
        <div class="circle" id="c3"></div>
        <div class="circle" id="c4"></div>
        <div class="circle" id="c5"></div>
        <div class="circle" id="c6"></div>
        <div class="circle" id="c7"></div>
        <div class="circle" id="c8"></div>
        <div class="circle" id="c9"></div>
        <div class="circle" id="c10"></div>
        <div class="circle" id="c11"></div>
        <div class="circle" id="c12"></div>
        <div class="circle" id="c13"></div>
        <div class="circle" id="c14"></div>
        <div class="circle" id="c15"></div>
        <div class="circle" id="c16"></div>
        <div class="circle" id="c17"></div>
        <div class="circle" id="c18"></div>
        <div class="circle" id="c19"></div>
        <div class="circle" id="c20"></div>
    </div>

    <div class="dialogue_box">
        <div class="portrait">
            <img alt="Character Portrait">
        </div>
        <div class="right">
            <div class="name">Name</div>
            <div class="text"></div>
        </div>
        <div class="options">
            <button class="option_button template">Text response button</button>
        </div>
    </div>

    <script type="module" src="./scripts/globals.js"></script>
    <script type="module" src="./scripts/dialogue.js"></script>
    <script type="module" src="./scripts/characters.js"></script>
    <script type="module" src="./scripts/scenes.js"></script>
    <script type="module" src="./scripts/main.js"></script>
</body>
</html>
