        <div class="dust_circle" id="c21"></div>

    </section>

    <section class="game_over">
        <h1>GAME OVER</h1>
    </section>

    <section class="dialogue_box">
        <div class="portrait">
            <img alt="Character Portrait">
        </div>
        <div class="right">
            <div class="name">Name</div>
            <div class="text"></div>
        </div>
        <div class="options">
            <button class="option_button template">Text response button</button>
        </div>
    </section>
